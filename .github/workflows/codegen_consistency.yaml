name: Codegen Consistency

on:
  push:
    branches:
      - mainx
  pull_request: {}
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  FRB_MAIN_RUST_VERSION: 1.88.0
  FRB_MAIN_DART_VERSION: 3.6.2
  FRB_MAIN_FLUTTER_VERSION: 3.27.4

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codegen_consistency:
    name: "Generate :: Consistency :: pure_dart"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.FRB_MAIN_RUST_VERSION }}
          components: rustfmt, clippy

      - run: rustup toolchain install nightly && rustup component add rustfmt --toolchain nightly-x86_64-unknown-linux-gnu

      - uses: flutter-actions/setup-flutter@v4
        with:
          cache: true
          version: ${{ env.FRB_MAIN_FLUTTER_VERSION }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.6.24

      - run: yarn global add all-contributors-cli

      - name: Generate internal
        id: generate_internal
        continue-on-error: true
        run: |
          mkdir -p artifacts
          ./frb_internal generate-internal --coverage > artifacts/generate-internal.log 2>&1

      - name: Generate pure_dart codegen command output
        id: generate_pure_dart
        continue-on-error: true
        run: |
          mkdir -p artifacts
          ./frb_internal generate-run-frb-codegen-command-generate --package frb_example/pure_dart --coverage > artifacts/generate-pure-dart.log 2>&1

      - name: Generate pure_dart_pde codegen command output
        id: generate_pure_dart_pde
        continue-on-error: true
        run: |
          mkdir -p artifacts
          ./frb_internal generate-run-frb-codegen-command-generate --package frb_example/pure_dart_pde --coverage > artifacts/generate-pure-dart-pde.log 2>&1

      - name: Generate flutter_via_create integrate output
        id: generate_integrate_flutter_via_create
        continue-on-error: true
        run: |
          mkdir -p artifacts
          ./frb_internal generate-run-frb-codegen-command-integrate --package frb_example/flutter_via_create --coverage > artifacts/generate-integrate-flutter-via-create.log 2>&1

      - name: Generate flutter_via_integrate integrate output
        id: generate_integrate_flutter_via_integrate
        continue-on-error: true
        run: |
          mkdir -p artifacts
          ./frb_internal generate-run-frb-codegen-command-integrate --package frb_example/flutter_via_integrate --coverage > artifacts/generate-integrate-flutter-via-integrate.log 2>&1

      - name: Generate flutter_package integrate output
        id: generate_integrate_flutter_package
        continue-on-error: true
        run: |
          mkdir -p artifacts
          ./frb_internal generate-run-frb-codegen-command-integrate --package frb_example/flutter_package --coverage > artifacts/generate-integrate-flutter-package.log 2>&1

      - name: Collect codegen diff
        if: always()
        id: collect_diff
        run: |
          mkdir -p artifacts
          git status --short
          if ! git diff --quiet; then
            git diff --binary > artifacts/codegen.diff
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload codegen diff artifact
        if: always() && steps.collect_diff.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codegen-diff-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/codegen.diff
          if-no-files-found: error

      - name: Upload codegen logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codegen-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/*.log
          if-no-files-found: error

      - name: Fail when generated code is not up to date
        if: always()
        run: |
          command_failed=false
          if [ "${{ steps.generate_internal.outcome }}" != "success" ]; then command_failed=true; fi
          if [ "${{ steps.generate_pure_dart.outcome }}" != "success" ]; then command_failed=true; fi
          if [ "${{ steps.generate_pure_dart_pde.outcome }}" != "success" ]; then command_failed=true; fi
          if [ "${{ steps.generate_integrate_flutter_via_create.outcome }}" != "success" ]; then command_failed=true; fi
          if [ "${{ steps.generate_integrate_flutter_via_integrate.outcome }}" != "success" ]; then command_failed=true; fi
          if [ "${{ steps.generate_integrate_flutter_package.outcome }}" != "success" ]; then command_failed=true; fi

          diff_changed=false
          if ! git diff --quiet; then diff_changed=true; fi

          if [ "$command_failed" = true ] || [ "$diff_changed" = true ]; then
            echo "Generated code is out of date or generation failed."
            echo "Download artifact 'codegen-diff-*' for the patch."
            exit 1
          fi
